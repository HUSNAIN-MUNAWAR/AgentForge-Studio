<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="760" viewBox="0 0 1320 760" role="img" aria-labelledby="title desc">
  <title id="title">AgentForge Studio system workflow</title>
  <desc id="desc">Architecture diagram showing the Next.js dashboard, FastAPI backend, database, queue, worker, agent engine, policy layer, tools, memory, traces, approvals, and evaluation loop.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0c1328"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#10233d"/>
      <stop offset="100%" stop-color="#0d1830"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="11" refY="6" orient="auto">
      <path d="M2 2 L11 6 L2 10 Z" fill="#38bdf8"/>
    </marker>
    <style>
      .title { fill: #f8fafc; font: 700 34px Arial, sans-serif; }
      .subtitle { fill: #a8c7e8; font: 16px Arial, sans-serif; }
      .box { fill: url(#panel); stroke: #294466; stroke-width: 1.5; rx: 14; }
      .box-strong { fill: #0f2f4a; stroke: #22d3ee; stroke-width: 2; rx: 14; }
      .label { fill: #f8fafc; font: 700 18px Arial, sans-serif; }
      .small { fill: #b7c7da; font: 13px Arial, sans-serif; }
      .tag { fill: #67e8f9; font: 700 12px Arial, sans-serif; letter-spacing: 2px; }
      .line { fill: none; stroke: #38bdf8; stroke-width: 2.5; marker-end: url(#arrow); }
      .line-muted { fill: none; stroke: #64748b; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1320" height="760" fill="url(#bg)"/>
  <text x="54" y="62" class="title">AgentForge Studio v2</text>
  <text x="54" y="92" class="subtitle">Self-hosted AgentOps platform for building, running, tracing, approving, and evaluating multi-agent teams.</text>

  <rect x="54" y="132" width="210" height="92" class="box-strong"/>
  <text x="78" y="166" class="tag">OPERATOR</text>
  <text x="78" y="195" class="label">Developer / PM</text>

  <rect x="342" y="116" width="250" height="124" class="box-strong"/>
  <text x="370" y="150" class="tag">FRONTEND</text>
  <text x="370" y="182" class="label">Next.js Dashboard</text>
  <text x="370" y="208" class="small">Packs, runs, traces, approvals,</text>
  <text x="370" y="228" class="small">tools, memory, evals, settings</text>

  <rect x="668" y="116" width="250" height="124" class="box-strong"/>
  <text x="696" y="150" class="tag">API</text>
  <text x="696" y="182" class="label">FastAPI Backend</text>
  <text x="696" y="208" class="small">REST, WebSocket events,</text>
  <text x="696" y="228" class="small">validation, seed data</text>

  <rect x="996" y="116" width="250" height="124" class="box"/>
  <text x="1024" y="150" class="tag">STATE</text>
  <text x="1024" y="182" class="label">PostgreSQL / SQLite</text>
  <text x="1024" y="208" class="small">Packs, runs, traces, memory,</text>
  <text x="1024" y="228" class="small">approvals, eval history</text>

  <rect x="342" y="324" width="250" height="112" class="box"/>
  <text x="370" y="358" class="tag">QUEUE</text>
  <text x="370" y="390" class="label">Redis / RQ Worker</text>
  <text x="370" y="416" class="small">Async execution path with</text>
  <text x="370" y="436" class="small">sync fallback for local demos</text>

  <rect x="668" y="310" width="250" height="140" class="box-strong"/>
  <text x="696" y="344" class="tag">RUNTIME</text>
  <text x="696" y="376" class="label">Agent Engine</text>
  <text x="696" y="402" class="small">Loads Agent Pack YAML,</text>
  <text x="696" y="422" class="small">executes workflow graph,</text>
  <text x="696" y="442" class="small">emits trace spans</text>

  <rect x="996" y="324" width="250" height="112" class="box"/>
  <text x="1024" y="358" class="tag">GUARDRAILS</text>
  <text x="1024" y="390" class="label">Policy + Approval</text>
  <text x="1024" y="416" class="small">Allow, block, or pause risky</text>
  <text x="1024" y="436" class="small">tool calls for human review</text>

  <rect x="184" y="548" width="220" height="108" class="box"/>
  <text x="212" y="582" class="tag">TOOLS</text>
  <text x="212" y="614" class="label">Tool Runtime</text>
  <text x="212" y="640" class="small">CSV, PDF, files, SQL, code,</text>
  <text x="212" y="660" class="small">draft email, GitHub issue</text>

  <rect x="464" y="548" width="220" height="108" class="box"/>
  <text x="492" y="582" class="tag">MEMORY</text>
  <text x="492" y="614" class="label">Search Layer</text>
  <text x="492" y="640" class="small">Document chunks and keyword</text>
  <text x="492" y="660" class="small">retrieval for agent context</text>

  <rect x="744" y="548" width="220" height="108" class="box"/>
  <text x="772" y="582" class="tag">OBSERVE</text>
  <text x="772" y="614" class="label">Trace Timeline</text>
  <text x="772" y="640" class="small">Agent steps, tool outputs,</text>
  <text x="772" y="660" class="small">policy decisions, latency</text>

  <rect x="1024" y="548" width="220" height="108" class="box"/>
  <text x="1052" y="582" class="tag">QUALITY</text>
  <text x="1052" y="614" class="label">Evaluation Lab</text>
  <text x="1052" y="640" class="small">Rule-based cases, reports,</text>
  <text x="1052" y="660" class="small">pass/fail history</text>

  <path d="M264 178 H342" class="line"/>
  <path d="M592 178 H668" class="line"/>
  <path d="M918 178 H996" class="line"/>
  <path d="M793 240 V310" class="line"/>
  <path d="M668 380 H592" class="line-muted"/>
  <path d="M918 380 H996" class="line"/>
  <path d="M793 450 V508 H294 V548" class="line"/>
  <path d="M793 450 V508 H574 V548" class="line"/>
  <path d="M793 450 V548" class="line"/>
  <path d="M918 450 V508 H1134 V548" class="line"/>
  <path d="M744 602 H684" class="line-muted"/>
  <path d="M1024 602 H964" class="line-muted"/>
  <path d="M1121 548 V486 H793 V450" class="line-muted"/>
</svg>
