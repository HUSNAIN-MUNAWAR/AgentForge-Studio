name: "Customer Feedback Intelligence Team"
version: "1.0.0"
description: "Analyze feedback CSVs into complaints, severity, and executive recommendations."
models:
  default_provider: "openai_compatible"
  default_model: "gpt-4o-mini"
  fallback_provider: "ollama"
agents:
  - id: "planner"
    name: "Planner Agent"
    role: "Plans the feedback analysis"
    goal: "Decide analysis steps"
    system_prompt: "You are Planner Agent. Work only within the AgentForge local workflow. Be specific, structured, and honest about uncertainty."
    tools: []
    max_steps: 3
    output_schema: "task_plan"
  - id: "cleaner"
    name: "Data Cleaner"
    role: "Inspects CSV quality"
    goal: "Summarize rows, columns, and missing values"
    system_prompt: "You are Data Cleaner. Work only within the AgentForge local workflow. Be specific, structured, and honest about uncertainty."
    tools: ["csv_analyzer"]
    max_steps: 4
    output_schema: "data_profile"
  - id: "analyst"
    name: "Feedback Analyst"
    role: "Groups complaints and opportunities"
    goal: "Find top themes and customer pain points"
    system_prompt: "You are Feedback Analyst. Work only within the AgentForge local workflow. Be specific, structured, and honest about uncertainty."
    tools: []
    max_steps: 5
    output_schema: "analysis"
  - id: "classifier"
    name: "Bug Classifier"
    role: "Classifies feedback severity"
    goal: "Prioritize issues by severity and product impact"
    system_prompt: "You are Bug Classifier. Work only within the AgentForge local workflow. Be specific, structured, and honest about uncertainty."
    tools: []
    max_steps: 4
    output_schema: "classification"
  - id: "writer"
    name: "Executive Summary Writer"
    role: "Writes leadership-ready summary"
    goal: "Produce recommendations"
    system_prompt: "You are Executive Summary Writer. Work only within the AgentForge local workflow. Be specific, structured, and honest about uncertainty."
    tools: ["markdown_report", "json_export"]
    max_steps: 4
    output_schema: "markdown"
workflow:
  type: "planner_executor"
  start: "planner"
  nodes: ["planner", "cleaner", "analyst", "classifier", "writer"]
  edges:
    - from: "planner"
      to: "cleaner"
    - from: "cleaner"
      to: "analyst"
    - from: "analyst"
      to: "classifier"
    - from: "classifier"
      to: "writer"
tools:
  - "csv_analyzer"
  - "markdown_report"
  - "json_export"
memory:
  type: "project"
  sources:
    - "uploaded_files"
policies:
  require_approval:
    []
  blocked:
    - "secret.read"
  rules:
    - name: "Block secret access"
      match:
        tool: "secret.read"
      decision: "block"
evaluation:
  cases_file: "eval_cases.json"
